<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koine Greek Parsing</title>
    <link rel="stylesheet" href="src/styles.css?v=20260510-row-label-gutter">
  </head>
  <body>
    <div id="app">
      <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; color: #20242a;">
        正在載入 Greek Parsing...
      </div>
    </div>
    <script>
      (function () {
        var fallbackStarted = false;

        function showStartupMessage(title, detail) {
          var app = document.getElementById("app");
          if (!app || document.documentElement.getAttribute("data-app-ready") === "true") return;
          app.innerHTML = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;line-height:1.6;color:#20242a;">'
            + '<h1 style="font-size:20px;margin:0 0 8px;">' + title + '</h1>'
            + '<p style="margin:0 0 12px;">' + detail + '</p>'
            + '<p style="margin:0;color:#68727f;">請確認網址是 http://127.0.0.1:5173/，不是 file:// 開頭。</p>'
            + '</div>';
        }

        function loadStandaloneFallback() {
          if (fallbackStarted || document.documentElement.getAttribute("data-app-ready") === "true") return;
          fallbackStarted = true;
          var script = document.createElement("script");
          script.src = "src/app-standalone.js?v=20260510-row-label-gutter";
          script.onerror = function () {
            showStartupMessage("App 尚未完成載入", "瀏覽器沒有成功載入 fallback script。");
          };
          document.body.appendChild(script);
        }

        window.addEventListener("error", function (event) {
          if (event.filename && event.filename.indexOf("app-standalone") !== -1) {
            showStartupMessage("Safari 載入時發生錯誤", event.message || "未知錯誤");
            return;
          }
          loadStandaloneFallback();
        }, true);

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason && (event.reason.message || String(event.reason));
          showStartupMessage("Safari 載入時發生錯誤", reason || "Promise 執行失敗");
        });

        window.setTimeout(function () {
          loadStandaloneFallback();
        }, 1200);

        window.setTimeout(function () {
          showStartupMessage("App 尚未完成載入", "瀏覽器沒有成功執行 app.js 或 fallback script。");
        }, 4500);
      }());
    </script>
    <script type="module" src="src/app.js?v=20260510-row-label-gutter"></script>
  </body>
</html>
